  - data/motion/Body_Processed/omomo_train.p
  - data/motion/Body_Processed/samp_train.p
  - data/motion/Body_Processed/arctic_train.p
  - data/motion/Body_Processed/grab_train.p
  - data/motion/Body_Processed/beat2_train.p
  - data/motion/Body_Processed/embody3d_train.p
  - data/motion/Body_Processed/mamma_train.p
  - data/motion/Body_Processed/interx_train.p
  - data/motion/Body_Processed/mamma_preds_train.p

