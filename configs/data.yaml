  - ARCTIC
  - GRAB
  - OMOMO

hand_art_dataset_list:
  - GRAB
  - ARCTIC
  - SAMP
  - TCDHANDS  
  - BEAT2
  - EMBODY3D
  - MAMMA
  - MAMMA_PREDS
  - INTERX

preproc:
  stats_file: data/motion/statistics.npy
  split_seed: 0
  generate_joint_files: true
  use_cuda: true
  norm_type: standardize

load_feats:
  - body_transl_delta_pelv       # 3
  - body_orient_xy               # 6
  - z_orient_delta               # 6
  - body_pose                    # 324
  - body_joints_local_wo_z_rot   # 165
  - contact_masks                # 4

# Per-dataset weighted training sampling. Coefficients act as frequencies.
#   strategy: target_share    -> weight = c_d / N_d  =>  P(dataset d) ∝ c_d
#                                (coefficient = absolute share, size-independent)
#   strategy: size_multiplier -> weight = c_d         =>  P(dataset d) ∝ N_d·c_d
#                                (coefficient multiplies the natural size-frequency)
sampling:
  enabled: true
  strategy: size_multiplier
  default_coefficient: 1.0
  # Coefficients are RELATIVE weights — they need NOT sum to 1. The code
  # normalizes internally (P(dataset d) = c_d / Σc with target_share) 
  coefficients:
    
    # target_share
    # AMASS: 2
    # OMOMO: 1.2
    # SAMP: 0.1
    # ARCTIC: 3
    # GRAB: 3
    # BEAT2: 1
    # EMBODY3D: 3
    # MAMMA: 0.2
    # MAMMA_PREDS: 0.6

    # size multiplier
    AMASS: 1.6
    INTERX: 1.3
    OMOMO: 1.8
    SAMP: 1
    ARCTIC: 3
    GRAB: 2
    BEAT2: 0.4
    EMBODY3D: 0.8
    MAMMA: 10
    MAMMA_PREDS: 4
